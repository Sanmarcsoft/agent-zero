<html>
  <head>
    <title>Avatar & Voice</title>
  </head>

  <body>
    <script type="module">
      import { createStore } from "/js/AlpineStore.js";

      const model = {
        voices: [],
        voicesLoading: false,
        voicesError: null,
        ttsServerUrl: "http://10.0.0.96:8880",
        avatarPreviewUrl: null,
        testAudioPlaying: false,

        async loadVoices() {
          this.voicesLoading = true;
          this.voicesError = null;
          try {
            const url = this.ttsServerUrl || "http://10.0.0.96:8880";
            const resp = await fetch(`${url}/v1/voices`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            this.voices = data.voices || [];
          } catch (e) {
            this.voicesError = e.message;
            this.voices = [];
          } finally {
            this.voicesLoading = false;
          }
        },

        async testVoice(voiceId) {
          if (this.testAudioPlaying) return;
          this.testAudioPlaying = true;
          try {
            const url = this.ttsServerUrl || "http://10.0.0.96:8880";
            const resp = await fetch(`${url}/v1/audio/speech`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                input: "Hello, I am ready to assist you.",
                voice: voiceId,
                response_format: "mp3",
              }),
            });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const blob = await resp.blob();
            const audio = new Audio(URL.createObjectURL(blob));
            audio.onended = () => { this.testAudioPlaying = false; };
            audio.onerror = () => { this.testAudioPlaying = false; };
            audio.play();
          } catch (e) {
            this.testAudioPlaying = false;
            alert("Voice test failed: " + e.message);
          }
        },

        async reloadVoices() {
          try {
            const url = this.ttsServerUrl || "http://10.0.0.96:8880";
            await fetch(`${url}/v1/voices/reload`, { method: "POST" });
            await this.loadVoices();
          } catch (e) {
            this.voicesError = "Reload failed: " + e.message;
          }
        },

        handleAvatarUpload(event) {
          const file = event.target.files[0];
          if (!file || !file.type.startsWith("image/")) return;
          const reader = new FileReader();
          reader.onload = (e) => {
            this.avatarPreviewUrl = e.target.result;
            // Store in settings for persistence
            const settings = Alpine.store("settings");
            if (settings && settings.settings) {
              settings.settings.avatar_image_data = e.target.result;
            }
          };
          reader.readAsDataURL(file);
        },

        clearAvatar() {
          this.avatarPreviewUrl = null;
          const settings = Alpine.store("settings");
          if (settings && settings.settings) {
            settings.settings.avatar_image_data = null;
          }
        },

        init() {
          this.loadVoices();
          // Restore avatar preview from settings
          const settings = Alpine.store("settings");
          if (settings?.settings?.avatar_image_data) {
            this.avatarPreviewUrl = settings.settings.avatar_image_data;
          }
        },
      };

      createStore("avatarVoice", model);
    </script>

    <div x-data x-init="$store.avatarVoice.init()">
      <template x-if="$store.settings.settings">
        <div>
          <div class="section-title">Avatar & Voice</div>
          <div class="section-description">
            Configure the avatar image and voice for this agent. Upload a face photo for the live avatar and select a voice from the Percy TTS server.
          </div>

          <!-- Avatar Image -->
          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">Avatar Image</div>
              <div class="field-description">Upload a face photo for the live avatar animation. Works best with a clear, front-facing photo.</div>
            </div>
            <div class="field-control">
              <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:80px; height:80px; border-radius:12px; border:2px dashed var(--border-color, #333); display:flex; align-items:center; justify-content:center; overflow:hidden; cursor:pointer; background:var(--bg-secondary, #1a1a2e);"
                     @click="$refs.avatarInput.click()">
                  <template x-if="$store.avatarVoice.avatarPreviewUrl">
                    <img :src="$store.avatarVoice.avatarPreviewUrl" style="width:100%; height:100%; object-fit:cover;" />
                  </template>
                  <template x-if="!$store.avatarVoice.avatarPreviewUrl">
                    <span class="material-symbols-outlined" style="font-size:32px; opacity:0.4;">face</span>
                  </template>
                </div>
                <div style="display:flex; flex-direction:column; gap:4px;">
                  <button class="btn btn-sm" @click="$refs.avatarInput.click()">Upload Photo</button>
                  <button class="btn btn-sm btn-secondary"
                          x-show="$store.avatarVoice.avatarPreviewUrl"
                          @click="$store.avatarVoice.clearAvatar()">Remove</button>
                </div>
                <input type="file" accept="image/*" x-ref="avatarInput" style="display:none;"
                       @change="$store.avatarVoice.handleAvatarUpload($event)" />
              </div>
            </div>
          </div>

          <!-- Agent Display Name -->
          <div class="field">
            <div class="field-label">
              <div class="field-title">Agent Name</div>
              <div class="field-description">Display name for this agent (e.g. "Q", "Moneypenny").</div>
            </div>
            <div class="field-control">
              <input type="text"
                     x-model="$store.settings.settings.avatar_agent_name"
                     placeholder="Q" />
            </div>
          </div>

          <!-- TTS Server URL -->
          <div class="field">
            <div class="field-label">
              <div class="field-title">TTS Server URL</div>
              <div class="field-description">Percy TTS server endpoint for voice synthesis.</div>
            </div>
            <div class="field-control">
              <input type="text"
                     x-model="$store.settings.settings.avatar_tts_url"
                     placeholder="http://10.0.0.96:8880"
                     @change="$store.avatarVoice.ttsServerUrl = $store.settings.settings.avatar_tts_url; $store.avatarVoice.loadVoices()" />
            </div>
          </div>

          <!-- Voice Selection -->
          <div class="field">
            <div class="field-label">
              <div class="field-title">Voice</div>
              <div class="field-description">
                Select the voice profile for this agent.
                <template x-if="$store.avatarVoice.voicesError">
                  <span style="color:var(--error-color, #ef4444);" x-text="'Error: ' + $store.avatarVoice.voicesError"></span>
                </template>
              </div>
            </div>
            <div class="field-control">
              <div style="display:flex; gap:8px; align-items:center;">
                <select x-model="$store.settings.settings.avatar_voice"
                        :disabled="$store.avatarVoice.voicesLoading">
                  <option value="">-- Select Voice --</option>
                  <template x-for="voice in $store.avatarVoice.voices" :key="voice.id">
                    <option :value="voice.id"
                            :selected="voice.id === $store.settings.settings.avatar_voice"
                            x-text="voice.name + ' (' + voice.id + ')'"></option>
                  </template>
                </select>
                <button class="btn btn-sm btn-secondary"
                        @click="$store.avatarVoice.reloadVoices()"
                        :disabled="$store.avatarVoice.voicesLoading"
                        title="Rescan server for new voices">
                  <span class="material-symbols-outlined" style="font-size:16px;"
                        :class="{'spinning': $store.avatarVoice.voicesLoading}">refresh</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Voice Test -->
          <div class="field" x-show="$store.settings.settings.avatar_voice">
            <div class="field-label">
              <div class="field-title">Test Voice</div>
              <div class="field-description">Play a sample with the selected voice.</div>
            </div>
            <div class="field-control">
              <button class="btn btn-sm"
                      @click="$store.avatarVoice.testVoice($store.settings.settings.avatar_voice)"
                      :disabled="$store.avatarVoice.testAudioPlaying">
                <span x-text="$store.avatarVoice.testAudioPlaying ? 'Playing...' : 'Play Sample'"></span>
              </button>
            </div>
          </div>

          <!-- Voice Details -->
          <template x-for="voice in $store.avatarVoice.voices.filter(v => v.id === $store.settings.settings.avatar_voice)" :key="voice.id">
            <div class="field field-full">
              <div class="field-label">
                <div class="field-title">Voice Details</div>
              </div>
              <div class="field-control">
                <div style="font-size:12px; opacity:0.7; line-height:1.6;">
                  <div><strong>Model:</strong> <span x-text="voice.model"></span></div>
                  <div><strong>Sample Rate:</strong> <span x-text="voice.sample_rate + ' Hz'"></span></div>
                  <div><strong>Reference:</strong> <span x-text="voice.ref_text_preview"></span></div>
                  <div><strong>Embedding Cached:</strong> <span x-text="voice.embedding_cached ? 'Yes' : 'No (will cache on first use)'"></span></div>
                </div>
              </div>
            </div>
          </template>

          <!-- Avatar Live Link -->
          <div class="field field-full">
            <div class="field-label">
              <div class="field-title">Avatar Display</div>
              <div class="field-description">Open the live avatar renderer in a new window. This is the display that runs on the ASUS laptop.</div>
            </div>
            <div class="field-control">
              <button class="btn btn-sm" @click="window.open('/avatar-live.html', 'avatar', 'width=900,height=600')">
                Open Avatar Display
              </button>
            </div>
          </div>

        </div>
      </template>
    </div>
  </body>
</html>
